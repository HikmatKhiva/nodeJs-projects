version: "3.8"

services:
  app:
    build: .
    container_name: weather-app
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=${REDIS_URL}
      - API_KEY=${API_KEY}
    volumes:
      - .:/app
      # - /app/node_modules

  redis:
    image: redis:latest
    container_name: weather_redis
    ports:
      - "6379:6379"
    restart: always